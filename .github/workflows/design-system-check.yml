name: Design system guardrail

# Runs on every push and PR — including the PR that lands a Claude Design export —
# so a known regression (black logo, text-in-funnel-bar, jagged sparkline, Inter
# fonts) blocks the merge instead of shipping silently.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-primitives:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check primitives & assets
        run: node tools/check-primitives.mjs .
