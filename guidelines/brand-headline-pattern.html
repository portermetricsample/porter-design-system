<!-- @dsCard group="Brand" viewport="700x230" name="Two-line headline pattern" subtitle="Normal word on top, key word huge below, accented purple" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--porter-dark);}
  .wrap{padding:30px 36px;}
  .eb{font-family:var(--font-alt);font-weight:500;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--porter-yellow);margin-bottom:14px;}
  .h{font-family:var(--font-display);font-weight:900;font-size:80px;line-height:.86;letter-spacing:-3.5px;text-transform:uppercase;color:#fff;margin:0;}
  .h strong{color:var(--purple-500);}
</style></head>
<body>
  <div class="wrap">
    <div class="eb">Marketing reporting</div>
    <p class="h">Report<br /><strong>faster</strong></p>
  </div>
</body></html>
