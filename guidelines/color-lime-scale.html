<!-- @dsCard group="Colors" viewport="700x130" name="Lime scale" subtitle="--lime-100 → 700, an accent ramp (use sparingly, highlight only)" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--porter-white);font-family:var(--font-alt);}
  .wrap{display:flex;gap:8px;padding:24px;}
  .sw{flex:1;height:78px;border-radius:10px;display:flex;align-items:flex-end;padding:8px;box-sizing:border-box;font-size:11px;font-weight:600;}
</style></head>
<body>
  <div class="wrap">
    <div class="sw" style="background:var(--lime-100);color:#5d7400;">100</div>
    <div class="sw" style="background:var(--lime-200);color:#5d7400;">200</div>
    <div class="sw" style="background:var(--lime-300);color:#3f5000;">300</div>
    <div class="sw" style="background:var(--lime-400);color:#3f5000;">400</div>
    <div class="sw" style="background:var(--lime-600);color:#fff;">600</div>
    <div class="sw" style="background:var(--lime-700);color:#fff;">700</div>
  </div>
</body></html>
