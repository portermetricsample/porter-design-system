<!-- @dsCard group="Spacing" viewport="700x160" name="Space scale" subtitle="4 → 128px spacing ramp" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--porter-white);font-family:var(--font-alt);}
  .wrap{padding:24px 32px;display:flex;align-items:flex-end;gap:14px;}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .bar{width:34px;background:var(--porter-purple);border-radius:6px;}
  .lbl{font-size:11px;color:var(--porter-muted);}
</style></head>
<body>
  <div class="wrap">
    <div class="col"><div class="bar" style="height:8px"></div><span class="lbl">8</span></div>
    <div class="col"><div class="bar" style="height:16px"></div><span class="lbl">16</span></div>
    <div class="col"><div class="bar" style="height:24px"></div><span class="lbl">24</span></div>
    <div class="col"><div class="bar" style="height:32px"></div><span class="lbl">32</span></div>
    <div class="col"><div class="bar" style="height:48px"></div><span class="lbl">48</span></div>
    <div class="col"><div class="bar" style="height:64px"></div><span class="lbl">64</span></div>
    <div class="col"><div class="bar" style="height:96px"></div><span class="lbl">96</span></div>
  </div>
</body></html>
