<!-- @dsCard group="Colors" viewport="700x130" name="Pink & aqua scales" subtitle="Tint ramps used behind badges and accents" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--porter-white);font-family:var(--font-alt);}
  .wrap{padding:20px 24px;display:flex;flex-direction:column;gap:8px;}
  .row{display:flex;gap:8px;}
  .sw{flex:1;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;}
</style></head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw" style="background:var(--pink-100);color:var(--pink-700);">100</div>
      <div class="sw" style="background:var(--pink-200);color:var(--pink-700);">200</div>
      <div class="sw" style="background:var(--pink-400);color:#fff;">400</div>
      <div class="sw" style="background:var(--pink-500);color:#fff;">500</div>
      <div class="sw" style="background:var(--pink-700);color:#fff;">700</div>
    </div>
    <div class="row">
      <div class="sw" style="background:var(--aqua-100);color:var(--aqua-700);">100</div>
      <div class="sw" style="background:var(--aqua-200);color:var(--aqua-700);">200</div>
      <div class="sw" style="background:var(--aqua-400);color:var(--porter-dark);">400</div>
      <div class="sw" style="background:var(--aqua-500);color:#fff;">500</div>
      <div class="sw" style="background:var(--aqua-700);color:#fff;">700</div>
    </div>
  </div>
</body></html>
