<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--porter-white);font-family:var(--font-alt);}
  .wrap{padding:24px;display:flex;gap:12px;}
  .s{flex:1;height:110px;border-radius:18px;display:flex;align-items:flex-end;padding:12px;box-sizing:border-box;font-size:12px;font-weight:600;letter-spacing:.5px;}
</style></head>
<body>
  <div class="wrap">
    <div class="s" style="background:#fff;color:var(--porter-dark);box-shadow:inset 0 0 0 1px var(--border-hairline);">White</div>
    <div class="s" style="background:var(--porter-cream);color:var(--porter-dark);">Cream</div>
    <div class="s" style="background:var(--purple-100);color:var(--porter-purple);">Lavender</div>
    <div class="s" style="background:var(--porter-purple);color:#fff;">Purple</div>
    <div class="s" style="background:var(--porter-dark);color:#fff;">Dark</div>
  </div>
</body></html>
