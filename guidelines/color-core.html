<!-- @dsCard group="Colors" viewport="700x150" name="Core brand" subtitle="Purple primary + signature dark — the load-bearing pair" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--porter-white);font-family:var(--font-alt);}
  .wrap{display:flex;gap:14px;padding:24px;}
  .sw{flex:1;height:100px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:14px;box-sizing:border-box;}
  .name{font-size:13px;font-weight:600;letter-spacing:.5px;}
  .hex{font-size:12px;opacity:.8;text-transform:uppercase;}
</style></head>
<body>
  <div class="wrap">
    <div class="sw" style="background:var(--porter-purple);color:#fff;"><span class="name">Purple / primary</span><span class="hex">#6701E6</span></div>
    <div class="sw" style="background:var(--porter-dark);color:#fff;"><span class="name">Dark / signature</span><span class="hex">#1A0340</span></div>
  </div>
</body></html>
