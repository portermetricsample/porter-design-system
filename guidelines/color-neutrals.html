<!-- @dsCard group="Colors" viewport="700x150" name="Paper & neutrals" subtitle="Cream paper, white, muted text, hairline" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--porter-white);font-family:var(--font-alt);}
  .wrap{display:flex;gap:14px;padding:24px;}
  .sw{flex:1;height:100px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:14px;box-sizing:border-box;box-shadow:inset 0 0 0 1px var(--border-hairline);}
  .name{font-size:13px;font-weight:600;letter-spacing:.5px;}
  .hex{font-size:12px;opacity:.8;text-transform:uppercase;}
</style></head>
<body>
  <div class="wrap">
    <div class="sw" style="background:var(--porter-cream);color:var(--porter-dark);"><span class="name">Cream / paper</span><span class="hex">#FDF8F0</span></div>
    <div class="sw" style="background:var(--porter-white);color:var(--porter-dark);"><span class="name">White</span><span class="hex">#FFFFFF</span></div>
    <div class="sw" style="background:var(--porter-muted);color:#fff;"><span class="name">Muted text</span><span class="hex">#6B7280</span></div>
    <div class="sw" style="background:var(--neutral-200);color:var(--porter-dark);"><span class="name">Hairline</span><span class="hex">#E5E7EB</span></div>
  </div>
</body></html>
