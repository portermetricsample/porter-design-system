<!-- @dsCard group="Colors" viewport="700x150" name="Electric lime accent" subtitle="--accent on dark, --accent-deep for text/borders on light" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--porter-white);font-family:var(--font-alt);}
  .wrap{display:flex;gap:14px;padding:24px;}
  .sw{flex:1;height:100px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:14px;box-sizing:border-box;}
  .name{font-size:13px;font-weight:600;letter-spacing:.5px;}
  .hex{font-size:12px;opacity:.85;text-transform:uppercase;}
</style></head>
<body>
  <div class="wrap">
    <div class="sw" style="background:var(--porter-dark);"><span style="color:var(--accent);font-size:22px;font-weight:700;font-family:var(--font-display);margin-bottom:auto;">+12%</span><span class="name" style="color:var(--accent);">--accent on dark</span><span class="hex" style="color:rgba(255,255,255,.6);">#CDFB52</span></div>
    <div class="sw" style="background:var(--accent);color:var(--porter-dark);"><span class="name">--accent (lime)</span><span class="hex">#CDFB52</span></div>
    <div class="sw" style="background:var(--accent-deep);color:#fff;"><span class="name">--accent-deep</span><span class="hex">#9BC400</span></div>
  </div>
</body></html>
