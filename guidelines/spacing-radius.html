<!-- @dsCard group="Spacing" viewport="700x170" name="Radius" subtitle="Buttons 10–14, cards 20, badges pill — no drop shadows" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--porter-white);font-family:var(--font-alt);}
  .wrap{padding:24px 32px;display:flex;gap:18px;align-items:center;}
  .box{width:88px;height:88px;background:var(--purple-100);box-shadow:inset 0 0 0 2px var(--porter-purple);display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;box-sizing:border-box;font-size:11px;color:var(--porter-purple);font-weight:600;}
  .pill{width:120px;height:44px;border-radius:999px;}
</style></head>
<body>
  <div class="wrap">
    <div class="box" style="border-radius:10px">sm · 10</div>
    <div class="box" style="border-radius:14px">lg · 14</div>
    <div class="box" style="border-radius:20px">card · 20</div>
    <div class="box pill">badge · pill</div>
  </div>
</body></html>
