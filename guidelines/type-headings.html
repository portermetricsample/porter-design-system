<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--porter-white);}
  .wrap{padding:24px 32px;display:flex;flex-direction:column;gap:18px;}
  .spec{font-family:var(--font-alt);font-size:11px;letter-spacing:1px;color:var(--porter-muted);text-transform:uppercase;margin-bottom:6px;}
  .h1{font-family:var(--font-display);font-weight:800;font-size:54px;line-height:.95;letter-spacing:-2.5px;margin:0;color:var(--porter-black);}
  .h2{font-family:var(--font-display);font-weight:800;font-size:36px;line-height:1;letter-spacing:-1.5px;margin:0;color:var(--porter-black);}
  strong{color:var(--porter-purple);font-weight:900;}
</style></head>
<body>
  <div class="wrap">
    <div><div class="spec">H1 · Inter 800 · -2.5px</div><p class="h1">Your data, <strong>on brand</strong></p></div>
    <div><div class="spec">H2 · Inter 800 · -1.5px</div><p class="h2">Every channel, <strong>one report</strong></p></div>
  </div>
</body></html>
