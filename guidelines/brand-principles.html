<!-- @dsCard group="Brand" viewport="700x200" name="Principles" subtitle="Solid color, zero decoration, max 3 colors per surface" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--porter-cream);font-family:var(--font-display);}
  .wrap{padding:26px 32px;display:grid;grid-template-columns:1fr 1fr;gap:12px 28px;}
  .item{display:flex;gap:10px;align-items:baseline;}
  .n{font-family:var(--font-alt);font-size:12px;color:var(--porter-purple);font-weight:600;}
  .t{font-size:16px;color:var(--porter-dark);font-weight:600;}
  .x{color:var(--porter-muted);font-weight:500;}
</style></head>
<body>
  <div class="wrap">
    <div class="item"><span class="n">01</span><span class="t">Type is the hero</span></div>
    <div class="item"><span class="n">02</span><span class="t">Solid color, <span class="x">never gradients</span></span></div>
    <div class="item"><span class="n">03</span><span class="t">No drop shadows</span></div>
    <div class="item"><span class="n">04</span><span class="t">Max 3 colors per surface</span></div>
    <div class="item"><span class="n">05</span><span class="t">No random icons</span></div>
    <div class="item"><span class="n">06</span><span class="t">Mono uppercase for meta</span></div>
  </div>
</body></html>
