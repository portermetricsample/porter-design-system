<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--porter-white);}
  .wrap{padding:24px 32px;display:flex;flex-direction:column;gap:16px;}
  .spec{font-family:var(--font-alt);font-size:11px;letter-spacing:1px;color:var(--porter-muted);text-transform:uppercase;margin-bottom:6px;}
  .body{font-family:var(--font-display);font-size:18px;line-height:1.55;color:var(--porter-dark);max-width:560px;margin:0;}
  .mono{font-family:var(--font-alt);font-weight:500;font-size:14px;letter-spacing:2px;text-transform:uppercase;color:var(--porter-purple);}
</style></head>
<body>
  <div class="wrap">
    <div><div class="spec">Body · Inter 400 · 18px · 1.55</div><p class="body">Pull every marketing metric into one on-brand dashboard your clients actually want to read.</p></div>
    <div><div class="spec">Mono · IBM Plex Mono · uppercase · tracked</div><p class="mono">Marketing reports</p></div>
  </div>
</body></html>
