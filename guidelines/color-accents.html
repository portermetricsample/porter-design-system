<!-- @dsCard group="Colors" viewport="700x150" name="Accents" subtitle="Pink, aqua & yellow — supporting colors, one per surface" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--porter-white);font-family:var(--font-alt);}
  .wrap{display:flex;gap:14px;padding:24px;}
  .sw{flex:1;height:100px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:14px;box-sizing:border-box;}
  .name{font-size:13px;font-weight:600;letter-spacing:.5px;}
  .hex{font-size:12px;opacity:.85;text-transform:uppercase;}
</style></head>
<body>
  <div class="wrap">
    <div class="sw" style="background:var(--porter-pink);color:#fff;"><span class="name">Pink</span><span class="hex">#EC4899</span></div>
    <div class="sw" style="background:var(--porter-aqua);color:var(--porter-dark);"><span class="name">Aqua</span><span class="hex">#2DD4BF</span></div>
    <div class="sw" style="background:var(--porter-yellow);color:var(--porter-dark);"><span class="name">Yellow</span><span class="hex">#FBBF24</span></div>
  </div>
</body></html>
