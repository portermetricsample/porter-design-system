<!-- @dsCard group="Colors" viewport="700x130" name="Purple scale" subtitle="--purple-100 → 950, for tints and dark surfaces" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--porter-white);font-family:var(--font-alt);}
  .wrap{display:flex;gap:8px;padding:24px;}
  .sw{flex:1;height:78px;border-radius:10px;display:flex;align-items:flex-end;padding:8px;box-sizing:border-box;font-size:11px;font-weight:600;}
</style></head>
<body>
  <div class="wrap">
    <div class="sw" style="background:var(--purple-100);color:#3a0a80;">100</div>
    <div class="sw" style="background:var(--purple-300);color:#3a0a80;">300</div>
    <div class="sw" style="background:var(--purple-500);color:#fff;">500</div>
    <div class="sw" style="background:var(--purple-600);color:#fff;">600</div>
    <div class="sw" style="background:var(--purple-800);color:#fff;">800</div>
    <div class="sw" style="background:var(--purple-900);color:#fff;">900</div>
    <div class="sw" style="background:var(--purple-950);color:#fff;">950</div>
  </div>
</body></html>
